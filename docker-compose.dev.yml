services:
  mysql:
    ports:
      - "127.0.0.1:$DB_PORT:3306"
    env_file:
      - .env.dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./test_db_init.sql:/docker-entrypoint-initdb.d/test_db_init.sql
    environment:
      MYSQL_ROOT_PASSWORD: $DB_ROOT_PASS
      MYSQL_DATABASE: test_db

  flyway:
    env_file:
      - .env.dev
    environment:
      FLYWAY_URL: jdbc:mysql://mysql:3306/test_db?allowPublicKeyRetrieval=1
      FLYWAY_USER: root
      FLYWAY_PASSWORD: $DB_ROOT_PASS

  selenium-chrome:
    ports:
      - "127.0.0.1:$SELENIUM_SERVER_PORT:4444"

  ui-tests:
    env_file:
      - .env.dev

  apache:
    env_file:
      - .env.dev
    ports:
      - "127.0.0.1:$APACHE_PORT:80"
    image: httpd:2.4
    volumes:
      - $DOCS_PATH:/usr/local/apache2/htdocs/
    profiles: ["docs"]

volumes:
  mysql_dev_data: