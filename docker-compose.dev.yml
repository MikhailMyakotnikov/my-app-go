services:
  mysql:
    ports:
      - "127.0.0.1:$DB_PORT:3306"
    env_file:
      - .env.dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: $DB_ROOT_PASS
      MYSQL_DATABASE: test_db

  flyway:
    env_file:
      - .env.dev
    environment:
      FLYWAY_URL: jdbc:mysql://mysql:3306/test_db?createDatabaseIfNotExist=1&allowPublicKeyRetrieval=1
      FLYWAY_USER: root
      FLYWAY_PASSWORD: $DB_ROOT_PASS

  selenium-chrome:
    ports:
      - "127.0.0.1:$SELENIUM_SERVER_PORT:4444"

  ui-tests:
    env_file:
      - .env.dev

volumes:
  mysql_dev_data: