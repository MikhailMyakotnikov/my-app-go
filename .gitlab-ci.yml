image: golang:1.24

stages:
  - test
  - build
  - deploy
  - release

test:
  stage: test
  script: go test -cover ./repositories/

build:
  stage: build
  script: go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

deploy:
  stage: deploy
  before_script: 
    - apt update && apt install -y zip
    - zip -v
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release/'
  script: generate_go_documentation
  release:
    tag_name: $CI_COMMIT_TAG
    description: 'Release created using the CLI.'