stages:
  - test
  - build
  - deploy

test:
  stage: test
  before_script:
    tar -C /usr/local -xzf go1.25.4.linux-amd64.tar.gz &&
    export PATH=$PATH:/usr/local/go/bin &&
    go version
  script: go test -cover ./repositories/

build:
  stage: build
  before_script:
    tar -C /usr/local -xzf go1.25.4.linux-amd64.tar.gz &&
    export PATH=$PATH:/usr/local/go/bin &&
    go version
  script: go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

deploy:
  stage: deploy
  before_script:
    tar -C /usr/local -xzf go1.25.4.linux-amd64.tar.gz &&
    export PATH=$PATH:/usr/local/go/bin &&
    go version
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build
