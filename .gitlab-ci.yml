image: golang:1.24

stages:
  - test
  - build
  - deploy

test:
  stage: test
  script: go test -cover ./repositories/

build:
  stage: build
  script: go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

deploy:
  stage: deploy
  before_script: 
    - apt update && apt install -y zip
    - zip -v
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build
