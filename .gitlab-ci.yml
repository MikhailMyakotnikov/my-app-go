stages:
  - test
  - build
  - deploy

test:
  stage: test
  before_script:
    apt install golang-go &&
    go version
  script: go test -cover ./repositories/

build:
  stage: build
  before_script:
    apt install golang-go &&
    go version
  script: go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

deploy:
  stage: deploy
  before_script:
    apt install golang-go &&
    go version
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build
