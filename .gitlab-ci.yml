image: golang:1.24

stages:
  - unit-test
  - build
  - ui-tests
  - deploy
  - release

unit-test:
  stage: unit-test
  script: go test -mod=vendor -cover ./repositories/

build:
  stage: build
  script: go build -mod=vendor -o app
  artifacts:
    paths:
      - app

ui-tests:
  stage: ui-tests
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
  image: docker:28.4.0
  services:
    - docker:28.4.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker compose \
      -f docker-compose.yml \
      -d \
      up
    - ./app
  script:
    - ./run-ui-tests
  dependencies:
    - build

deploy:
  stage: deploy
  image: docker:28.4.0
  services:
    - docker:28.4.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  dependencies:
    - build

generate_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  script:
    - go install golang.org/x/tools/cmd/godoc@v0.1.0
    - export PATH="$PATH:/root/go/bin"
    - . generate_go_documentation.sh
    - generate_go_documentation
  artifacts:
    paths:
      - godoc/

publish_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  before_script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - scp -i ~/.ssh/id_ed25519 -r godoc/* $SSH_USER@$SSH_HOST:/opt/my-app-go/docs/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:v0.24.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  script:
    - echo "Creating GitLab release..."
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'