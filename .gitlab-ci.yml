check_mysql:
  image: mysql:8
  services:
    - name: mysql:8
      alias: mysql
  variables:
    MYSQL_ROOT_PASSWORD: root
  script:
    - apt-get update && apt-get install -y mysql-client
    - mysqladmin ping -h mysql -uroot -proot

deploy-job:
  stage: deploy
  script:
    - echo "Артефакт собран, можно деплоить"
    - zip my-app-go.zip my-app-go
    - flyway -user=$DB_USER -password=$DB_PASS -url=jdbc:mysql://mysql:3306/my_app_go?useSSL=true&verifyServerCertificate=true&trustCertificateKeyStoreUrl=file:/etc/mysql/ssl/ca-truststore.jks&trustCertificateKeyStorePassword=123qwe migrate
  dependencies:
    - build-job