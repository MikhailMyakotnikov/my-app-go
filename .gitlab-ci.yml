image: golang:1.24

stages:
  - test
  - build
  - deploy
  - release

test:
  stage: test
  script: go test -cover ./repositories/

build:
  stage: build
  script: go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

deploy:
  stage: deploy
  before_script: 
    - apt update && apt install -y zip
    - zip -v
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build

release:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  before_script:
    - go install golang.org/x/tools/cmd/godoc@v0.1.0
    - export PATH="$PATH:/root/go/bin"
  script:
    - echo "running release_job..."
    - . generate_go_documentation.sh
    - generate_go_documentation
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'