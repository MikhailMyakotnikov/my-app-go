image: golang:1.24

stages:
  - test
  - build
  - deploy
  - release

test:
  stage: test
  script: go test -cover ./repositories/

build:
  stage: build
  script: go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

deploy:
  stage: deploy
  before_script: 
    - apt update && apt install -y zip
    - zip -v
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  before_script:
    - echo "Installing Go 1.24..."
    - wget https://go.dev/dl/go1.24.0.linux-amd64.tar.gz -O /tmp/go.tar.gz
    - tar -C /usr/local -xzf /tmp/go.tar.gz
    - export PATH="/usr/local/go/bin:$PATH"
    - go version
  script: 
      - . generate_go_documentation.sh
      - generate_go_documentation
  release:
    tag_name: $CI_COMMIT_TAG
    description: 'Release created using the CLI.'