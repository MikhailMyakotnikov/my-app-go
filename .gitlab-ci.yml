image: golang:1.24

stages:
  - test
  - build
  - deploy
  - release

test:
  stage: test
  script: go test -mod=vendor -cover ./repositories/

build:
  stage: build
  script: go build -mod=vendor -o my-app-go
  artifacts:
    paths:
      - my-app-go

deploy:
  stage: deploy
  before_script: 
    - apt update && apt install -y zip
    - zip -v
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build

generate_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  script:
    - go install golang.org/x/tools/cmd/godoc@v0.1.0
    - export PATH="$PATH:/root/go/bin"
    - . generate_go_documentation.sh
    - generate_go_documentation
  artifacts:
    paths:
      - godoc/

publish_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  before_script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - scp -r godoc/* $SSH_USER@$SSH_HOST:/opt/my-app-go/docs/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:v0.24.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  script:
    - echo "Creating GitLab release..."
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'