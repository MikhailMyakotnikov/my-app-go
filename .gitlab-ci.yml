stages:
  - build
  - test
  - deploy


build:
  stage: build
  script: go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

test:
  stage: test
  script: go test -cover ./repositories/
  dependencies:
  - build

deploy:
  stage: deploy
  script: zip my-app-go.zip my-app-go
  dependencies:
    - build