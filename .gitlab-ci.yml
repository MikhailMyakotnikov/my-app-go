image: golang:1.24

stages:
  - unit-test
  - build
  - migrates-test
  - ui-tests
  - migrates-prod
  - deploy
  - release

unit-test:
  rules:
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^test.*/ 
          && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "wip"'
  stage: unit-test
  script: go test -mod=vendor -cover ./repositories/

build:
  rules:
    - when: always
  stage: build
  script: 
    - CGO_ENABLED=0 GOOS=linux go build -mod=vendor -o my-app-go
  artifacts:
    paths:
      - my-app-go

migrate_test_db:
  stage: migrates-test
  dependencies:
    - build
  rules:
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^test.*/ 
          && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "wip"'
  image: docker:28.4.0
  services:
    - name: docker:28.4.0-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

    # app
    DB_USER: mikhail
    DB_PASS: $DEV_DB_PASS
    DB_HOST: localhost
    DB_PORT: 3307 
    DB_NAME: test_db
    APP_PORT: 8080

    # mysql container
    DB_ROOT_PASS: $DEV_DB_ROOT_PASS
    DB_INIT_SCRIPT_NAME: test_db_init.sql

    # flyway container
    FLYWAY_URL: jdbc:mysql://mysql:3306/test_db
    FLYWAY_USER: root
    FLYWAY_PASSWORD: $DEV_DB_ROOT_PASS

    COMPOSE_PROJECT_NAME: my-app-go-dev
  before_script:
    - chmod +x my-app-go
    - ENVIRONMENT=dev ./my-app-go & 
    - sleep 2
  script:
    - |
      docker compose \
      -f docker-compose.yml \
      -f docker-compose.ci.yml \
      --profile migrations \
      run \
      --rm \
      flyway \
      migrate

ui-tests:
  stage: ui-tests
  dependencies:
    - build
  rules:
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^test.*/ 
          && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "wip"'
  image: docker:28.4.0
  services:
    - name: docker:28.4.0-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

    # app
    DB_USER: mikhail
    DB_PASS: $DEV_DB_PASS
    DB_HOST: localhost
    DB_PORT: 3307 
    DB_NAME: test_db
    APP_PORT: 8080

    # mysql container
    DB_ROOT_PASS: $DEV_DB_ROOT_PASS
    DB_INIT_SCRIPT_NAME: test_db_init.sql

    # selenium-chrome container
    SELENIUM_SERVER_PORT: 4444

    COMPOSE_PROJECT_NAME: my-app-go-dev
  before_script:
    - chmod +x my-app-go
    - ENVIRONMENT=dev ./my-app-go & 
    - sleep 2
  script:
    - |
      docker compose \
      -f docker-compose.yml \
      -f docker-compose.ci.yml \
      --profile ui-tests \
      up \
      --abort-on-container-exit \
      --exit-code-from ui-tests

migrate_prod_db:
  stage: migrates-prod
  dependencies:
    - build
  rules:
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "wip"
          && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^release.*/'
  image: docker:28.4.0
  services:
    - name: docker:28.4.0-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

    # app
    DB_USER: mikhail
    DB_PASS: $PROD_DB_PASS
    DB_HOST: localhost
    DB_PORT: 3308 
    DB_NAME: prod_db
    APP_PORT: 8081

    # mysql container
    DB_ROOT_PASS: $PROD_DB_ROOT_PASS
    DB_INIT_SCRIPT_NAME: prod_db_init.sql

    # flyway container
    FLYWAY_URL: jdbc:mysql://mysql:3306/prod_db
    FLYWAY_USER: root
    FLYWAY_PASSWORD: $PROD_DB_ROOT_PASS

    COMPOSE_PROJECT_NAME: my-app-go-prod
  before_script:
    - chmod +x my-app-go
    - ENVIRONMENT=prod ./my-app-go & 
    - sleep 2
  script:
    - |
      docker compose \
      -f docker-compose.yml \
      -f docker-compose.ci.yml \
      --profile migrations \
      run \
      --rm \
      flyway \
      migrate

deploy:
  stage: deploy
  dependencies:
    - build
  rules:
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "wip"
          && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^release.*/'
  image: docker:28.4.0
  services:
    - name: docker:28.4.0-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

generate_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  script:
    - go install golang.org/x/tools/cmd/godoc@v0.1.0
    - export PATH="$PATH:/root/go/bin"
    - . generate_go_documentation.sh
    - generate_go_documentation
  artifacts:
    paths:
      - godoc/

publish_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  before_script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - scp -i ~/.ssh/id_ed25519 -r godoc/* $SSH_USER@$SSH_HOST:/opt/my-app-go/docs/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:v0.24.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  script:
    - echo "Creating GitLab release..."
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'