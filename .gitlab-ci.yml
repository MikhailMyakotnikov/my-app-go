image: golang:1.24

stages:
  - unit-test
  - build
  - ui-test
  - deploy
  - release

unit-test:
  stage: unit-test
  script: go test -mod=vendor -cover ./repositories/

build:
  stage: build
  image: docker:28.4.0
  services:
    - docker:28.4.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t my-app-go:$CI_COMMIT_SHORT_SHA .
    - docker save my-app-go:$CI_COMMIT_SHORT_SHA -o docker-image.tar
  artifacts:
    paths:
      - docker-image.tar

selenium:
  stage: ui-test
  image: docker:28.4.0
  services:
    - docker:28.4.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  dependencies:
    - build
  before_script:
    - docker load -i docker-image.tar
  script: 
    - docker compose \
      -f docker-compose.yml \
      -f docker-compose.ci.yml \
      --profile ui-tests \
      up \
      --abort-on-container-exit \
      --exit-code-from ui-tests

deploy:
  stage: deploy
  image: docker:28.4.0
  services:
    - docker:28.4.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  dependencies:
    - build
  before_script:
    - docker load -i docker-image.tar
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push my-app-go:$CI_COMMIT_SHORT_SHA

generate_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  script:
    - go install golang.org/x/tools/cmd/godoc@v0.1.0
    - export PATH="$PATH:/root/go/bin"
    - . generate_go_documentation.sh
    - generate_go_documentation
  artifacts:
    paths:
      - godoc/

publish_docs:
  stage: release
  rules: 
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  before_script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - scp -i ~/.ssh/id_ed25519 -r godoc/* $SSH_USER@$SSH_HOST:/opt/my-app-go/docs/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:v0.24.0
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release.*/'
  needs:
    - job: generate_docs
  script:
    - echo "Creating GitLab release..."
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'