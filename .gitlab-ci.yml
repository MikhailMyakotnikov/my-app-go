stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  script:
    - go build -o my-app-go
  artifacts:
    paths:
      - my-app-go

test-job:
  stage: test
  script:
    - go test -cover ./repositories/
  dependencies:
    - build-job

deploy-job:
  stage: deploy
  script:
    - echo "Артефакт собран, можно деплоить"
    - zip my-app-go.zip my-app-go
    # - flyway -user=$DB_USER -password=$DB_PASS -url=jdbc:mysql://mysql:3306/your_database migrate
  dependencies:
    - build-job