services:
  mysql:
    ports:
      - "3307:3306"

  app:
    environment:
      DB_HOST: $DB_HOST
      DB_PORT: $DB_PORT
      DB_USER: $DB_USER
      DB_PASSWORD: $DB_PASS
      DB_NAME: $DB_NAME
    ports:
      - "8081:8081"

  apache:
    image: httpd:2.4
    container_name: my-app-go-publish-docs
    ports:
      - "8082:80"
    volumes:
      - $DOCS_PATH:/usr/local/apache2/htdocs/
    profiles: ["docs"]

  selenium-chrome:
    depends_on:
      - app
    ports:
      - "4444:4444"
    extra_hosts:
    - "host.docker.internal:host-gateway"