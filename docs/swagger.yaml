info:
  contact: {}
  description: API для управления курсами и студентами
  license:
    name: MIT
  title: My CRUD App API
  version: "1.0"
paths:
  /courses:
    get:
      description: загружает HTML-страницу со списком курсов
      produces:
      - text/html
      responses:
        "200":
          description: HTML-страница
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает список курсов
      tags:
      - courses
  /courses/create:
    get:
      description: Загружает HTML-страницу с формой для создания нового курса
      produces:
      - text/html
      responses:
        "200":
          description: HTML-форма
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает форму создания курса
      tags:
      - courses
  /courses/delete:
    get:
      description: Удаляет название курса по ID, переданному через query-параметр
      parameters:
      - description: ID курса
        in: query
        name: id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /courses
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Удаляет информацию о курсе
      tags:
      - courses
  /courses/edit:
    get:
      description: Загружает HTML-страницу с формой для редактирования информации
        о курсе
      parameters:
      - description: ID курса
        in: query
        name: id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML-форма редактирования
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает форму редактирования курса
      tags:
      - courses
  /courses/insert:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Получает данные из формы и сохраняет новый курс в базу данных
      parameters:
      - description: Название курса
        in: formData
        name: title
        required: true
        type: string
      - description: ID преподавателя
        in: formData
        name: teacher_id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /courses
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Создает новый курс
      tags:
      - courses
  /courses/update:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Обновляет название курса по ID, переданному через форму
      parameters:
      - description: ID курса
        in: formData
        name: id
        required: true
        type: string
      - description: Новое название курса
        in: formData
        name: title
        required: true
        type: string
      - description: ID преподавателя
        in: formData
        name: teacher_id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /courses
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Обновляет информацию о курсе
      tags:
      - courses
  /students:
    get:
      description: загружает HTML-страницу со списком студентов
      produces:
      - text/html
      responses:
        "200":
          description: HTML-страница
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает список студентов
      tags:
      - students
  /students/create:
    get:
      description: Загружает HTML-страницу с формой для создания нового студента
