          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Обновляет информацию о студенте
      tags:
      - students
  /students_courses:
    get:
      description: загружает HTML-страницу со списком студентов и курсов, которые
        они посещают
      produces:
      - text/html
      responses:
        "200":
          description: HTML-страница
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает список студентов и их курсов
      tags:
      - students_courses
  /students_courses/create:
    get:
      description: Загружает HTML-страницу с формой для создания новой записи о студенте
        и курсе, который он посещает
      produces:
      - text/html
      responses:
        "200":
          description: HTML-форма
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает форму создания студентов и их курсов
      tags:
      - students_courses
  /students_courses/delete:
    get:
      description: Удаляет информацию о студенте и курсе, который он посещает, по
        ID студента и ID курса, переданным через query-параметры
      parameters:
      - description: ID студента
        in: query
        name: student_id
        required: true
        type: string
      - description: ID курса
        in: query
        name: course_id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /students_courses
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Удаляет информацию о студенте и курсе, который он посещает
      tags:
      - students_courses
  /students_courses/insert:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Получает данные из формы и сохраняет новую запись о студенте и
        курсе, который он посещает, в базу данных
      parameters:
      - description: ID студента
        in: formData
        name: student_id
        required: true
        type: string
      - description: ID курса
        in: formData
        name: course_id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /students_courses
          schema:
            type: string
        "500":
