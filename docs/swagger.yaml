      parameters:
      - description: Имя преподавателя
        in: formData
        name: name
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /teachers
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Создает нового преподавателя
      tags:
