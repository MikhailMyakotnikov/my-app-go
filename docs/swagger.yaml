      - text/html
      responses:
        "200":
          description: HTML-форма
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает форму создания студента
      tags:
      - students
  /students/delete:
    get:
      description: Удаляет имя студента по ID, переданному через query-параметр
      parameters:
      - description: ID студента
        in: query
        name: id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /students
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Удаляет информацию о студенте
      tags:
      - students
  /students/edit:
    get:
      description: Загружает HTML-страницу с формой для редактирования информации
        о студенте
      parameters:
      - description: ID студента
        in: query
        name: id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML-форма редактирования
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Отображает форму редактирования студента
      tags:
      - students
  /students/insert:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Получает данные из формы и сохраняет нового студента в базу данных
      parameters:
      - description: Имя студента
        in: formData
        name: name
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: Редирект на /students
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Создает нового студента
      tags:
      - students
  /students/update:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Обновляет имя студента по ID, переданному через форму
      parameters:
      - description: ID студента
        in: formData
        name: id
        required: true
        type: string
      - description: Новое имя студента
        in: formData
        name: name
        required: true
        type: string
      produces:
