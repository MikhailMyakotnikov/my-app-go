services:
  mysql:
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: $DB_ROOT_PASS
      MYSQL_DATABASE: $DB_NAME

  flyway:
    environment:
      FLYWAY_URL: $FLYWAY_URL
      FLYWAY_USER: $FLYWAY_USER
      FLYWAY_PASSWORD: $FLYWAY_PASSWORD

  selenium-chrome:
    ports:
      - "4444:4444"
    environment:
      APP_URL: http://my-app-go:${APP_PORT}

  ui-tests:
    environment:
      SELENIUM_SERVER_URI: http://selenium-chrome:4444
      APP_URL: http://my-app-go:${APP_PORT}