services:
  mysql:
    image: mysql:8.0.42
    container_name: my-app-go-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: $DB_ROOT_PASS
    volumes:
      - mysql_data:/var/lib/mysql
      - $PROJECT_PATH/full_dump.sql:/docker-entrypoint-initdb.d/full_dump.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-app-go
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: $DB_PORT
      DB_USER: $DB_USER
      DB_PASSWORD: $DB_PASS
      DB_NAME: $DB_NAME
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env:ro

  selenium-chrome:
    image: selenium/standalone-chrome:4.18.1
    container_name: selenium-chrome
    profiles: ["ui-tests"]

  ui-tests:
    build:
      context: ./ui-tests/UiTests
    depends_on:
      app:
        condition: service_started
      selenium-chrome:
        condition: service_started
    environment:
      SELENIUM_SERVER_URI: http://selenium-chrome:4444
      APP_BASE_URL: http://app:8081
    profiles: ["ui-tests"]

volumes:
  mysql_data: