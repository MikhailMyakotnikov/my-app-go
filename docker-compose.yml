services:
  mysql:
    image: mysql:8.0.42
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
  
  flyway:
    image: flyway/flyway:12.0.3
    volumes:
      - ./migrations:/flyway/sql
    environment:
      FLYWAY_LOCATIONS: filesystem:/flyway/sql #remove the warning
    depends_on:
      mysql:
        condition: service_healthy
    profiles: ["migrations"]
  
  selenium-chrome:
    image: selenium/standalone-chrome:130.0-20260222
    shm_size: 2gb
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    extra_hosts:
    - "host.docker.internal:host-gateway"
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -s http://localhost:4444/status | grep -q '\"ready\":true'"]
    #   interval: 5s
    #   timeout: 2s
    #   retries: 12
    #   start_period: 10s
    profiles: ["ui-tests"]

  ui-tests:
    build:
      context: ./ui-tests/UiTests
    depends_on:
      selenium-chrome:
        condition: service_started
    profiles: ["ui-tests"]