services:
  mysql:
    image: mysql:8.0.42
    container_name: my-app-go-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: $DB_ROOT_PASS
    volumes:
      - mysql_data:/var/lib/mysql
      - $PROJECT_PATH/full_dump.sql:/docker-entrypoint-initdb.d/full_dump.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  selenium-chrome:
    image: selenium/standalone-chrome:4.18.1
    container_name: selenium-chrome
    ports:
      - "4444:4444"
    extra_hosts:
    - "host.docker.internal:host-gateway"

volumes:
  mysql_data: