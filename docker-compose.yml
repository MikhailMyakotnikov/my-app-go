services:
  mysql:
    image: mysql:8.0.42
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/tcp/127.0.0.1/3306"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 300s
  
  flyway:
    image: flyway/flyway:12.0.3
    command: migrate
    volumes:
      - ./migrations:/flyway/sql
    environment:
      FLYWAY_LOCATIONS: filesystem:/flyway/sql #remove the warning
      FLYWAY_PLACEHOLDERS_USERPASSWORD: ${DB_PASS}
    depends_on:
      mysql:
        condition: service_healthy
    profiles: ["migrations"]
  
  selenium-chrome:
    image: selenium/standalone-chrome:130.0-20260222
    shm_size: 2gb
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    extra_hosts:
    - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 180s
    profiles: ["ui-tests"]

  ui-tests:
    build:
      context: ./ui-tests/UiTests
    depends_on:
      mysql:
        condition: service_healthy
      selenium-chrome:
        condition: service_healthy
    profiles: ["ui-tests"]