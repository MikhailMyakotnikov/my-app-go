<h1>Edit Course</h1>
<form action="/courses/update" method="POST">
    <input type="hidden" name="id" value="{{.Course.ID}}">
    <label>Название:</label><br>
    <input type="text" name="title" value="{{.Course.Title}}" required><br>
    <label>Преподаватель:</label><br>
    <select name="teacher_id">
        {{range .Teachers}}
        <option value="{{.ID}}" {{if eq .ID $.Course.TeacherID}}selected{{end}}>{{.Name}}</option>
        {{end}}
    </select><br><br>
    <button type="submit">Сохранить</button>
</form>
<a href="/courses">Назад к списку</a>
