<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список преподавателей</title>
</head>
<body>
    <h1>Преподаватели</h1>

    {{if .}}
        <table border="1" cellpadding="5">
            <tr>
                <th>Имя</th>
                <th>Действия</th>
            </tr>
            {{range .}}
            <tr>
                <td>{{.Name}}</td>
                <td>
                    <a href="/teachers/edit?id={{.ID}}" data-testid="edit-teacher-action-btn">Редактировать</a> |
                    <a href="/teachers/delete?id={{.ID}}" onclick="return confirm('Удалить преподавателя?')"
                        data-testid="delete-teacher-action-btn">Удалить</a>
                </td>
            </tr>
            {{end}}
        </table>
    {{else}}
        <p>Нет ни одного преподавателя.</p>
    {{end}}

    <br>
    <a href="/teachers/create">Добавить преподавателя</a>
    <br>
    <br>
    <a href="/">Назад</a>
</body>
</html>
